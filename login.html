<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L'Essence - Bejelentkezés</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="kozos.css" />
    <link rel="stylesheet" href="auth.css" />

  
  </head>
  <body>
    <header>
      <div class="logo">L'ESSENCE</div>
      <nav>
        <ul>
          <li><a href="index.html">Főoldal</a></li>
          <li><a href="elerhetoseg.html">Kapcsolat</a></li>
          <li><a href="bemutatkozas.html">Rólunk</a></li>
          <li><a href="webshop.html">Kollekciók</a></li>
        </ul>
      </nav>
    </header>

    <main class="auth-container">
      <div class="auth-card">
        <h1>Üdvözöljük!</h1>
        <p>Kérjük, jelentkezzen be a folytatáshoz.</p>

        <div class="error-msg" id="error-msg">Helytelen email vagy jelszó!</div>

        <form id="login-form">
          <div class="form-group">
            <label for="email">Email cím</label>
            <input
              type="email"
              id="email"
              required
              placeholder="pelda@email.hu"
            />
          </div>
          <div class="form-group">
            <label for="password">Jelszó</label>
            <input
              type="password"
              id="password"
              required
              placeholder="••••••••"
            />
          </div>
          <button type="submit" class="btn btn-gold">Bejelentkezés</button>
        </form>

        <div class="auth-links">
          Nincs még fiókja? <a href="register.html">Regisztráljon itt</a>
        </div>
      </div>
    </main>

    <footer>
      <p>&copy; 2024 L'Essence Parfüméria. Minden jog fenntartva.</p>
    </footer>

    <script>
      const loginForm = document.getElementById("login-form");
      const errorMsg = document.getElementById("error-msg");

      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const emailInput = document.getElementById("email").value.trim();
        const passwordInput = document.getElementById("password").value;

        try {
          const response = await fetch("http://localhost:3000/felhasznalok");
          const users = await response.json();

      
          const user = users.find(
            (u) => u.email === emailInput && u.jelszo === passwordInput,
          );

          if (user) {
            
            localStorage.setItem("logged_in_user", JSON.stringify(user));
            alert("Sikeres bejelentkezés!");
            window.location.href = "webshop.html";
          } else {
            errorMsg.style.display = "block";
          }
        } catch (error) {
          console.error("Hiba a bejelentkezés során:", error);
          alert("Nem sikerült kapcsolódni az adatbázishoz.");
        }
      });
    </script>
  </body>
</html>
